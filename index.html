<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }
    #gameContainer {
      position: relative;
      width: 400px;
      height: 600px;
    }
    canvas {
      display: block;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      border-radius: 12px;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    #overlay h1 {
      font-size: 48px;
      font-weight: 900;
      color: #ffe033;
      text-shadow: 3px 3px 0 #b8860b, 0 0 20px rgba(255,224,51,0.5);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    #overlay .subtitle {
      font-size: 14px;
      color: #adf;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }
    #overlay .score-box {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 16px 40px;
      margin-bottom: 24px;
    }
    #overlay .score-box .label {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #overlay .score-box .value {
      font-size: 48px;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
    }
    #overlay .best {
      font-size: 13px;
      color: #ffd700;
      margin-bottom: 30px;
    }
    #startBtn {
      background: linear-gradient(135deg, #ffe033, #ff9500);
      color: #333;
      font-size: 18px;
      font-weight: 800;
      border: none;
      padding: 14px 48px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 6px 0 #b8860b, 0 8px 20px rgba(0,0,0,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #startBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #b8860b, 0 10px 25px rgba(0,0,0,0.5); }
    #startBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas" width="400" height="600"></canvas>
  <div id="overlay">
    <h1>FLAPPY</h1>
    <div class="subtitle">BIRD</div>
    <div class="score-box" id="scoreBox" style="display:none">
      <div class="label">Score</div>
      <div class="value" id="finalScore">0</div>
    </div>
    <div class="best" id="bestDisplay"></div>
    <button id="startBtn" onclick="startGame()">PLAY</button>
    <div class="hint">Space / Click / Tap to flap</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game state
let state = 'idle'; // idle | playing | dead
let score = 0, best = 0;
let animFrame;

// Bird
const bird = {
  x: 100, y: 300, vy: 0,
  w: 38, h: 28,
  gravity: 0.15, flapPower: -6,
  rotation: 0,
  reset() { this.x = 100; this.y = 300; this.vy = 0; this.rotation = 0; }
};

// Pipes
const PIPE_W = 60, GAP = 200, PIPE_SPEED = 2.2;
let pipes = [];
let pipeTimer = 0, PIPE_INTERVAL = 110;

// Particles
let particles = [];

// Background layers (parallax)
const BG = {
  skyColors: ['#87CEEB', '#B0E0FF'],
  clouds: Array.from({length: 5}, (_, i) => ({
    x: i * 100, y: 40 + Math.random() * 80,
    w: 60 + Math.random() * 60, speed: 0.3 + Math.random() * 0.3
  })),
  groundY: H - 60
};

// Stars for background
const stars = Array.from({length: 30}, () => ({
  x: Math.random() * W,
  y: Math.random() * (H * 0.6),
  r: Math.random() * 1.5 + 0.5,
  alpha: Math.random() * 0.5 + 0.3
}));

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  bird.reset();
  pipes = [];
  particles = [];
  score = 0;
  pipeTimer = 0;
  state = 'playing';
  bird.vy = bird.flapPower;
  lastTime = 0;
  if (animFrame) cancelAnimationFrame(animFrame);
  loop();
}

function flap() {
  if (state === 'idle') {
    startGame();
    return;
  }
  if (state === 'playing') {
    bird.vy = bird.flapPower;
    spawnParticles(bird.x, bird.y + bird.h / 2, 6);
  }
}

function spawnParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * -2 - 1,
      life: 1, size: Math.random() * 5 + 2,
      color: `hsl(${50 + Math.random() * 30}, 90%, 70%)`
    });
  }
}

function spawnDeathParticles() {
  for (let i = 0; i < 20; i++) {
    const angle = (Math.PI * 2 * i) / 20;
    particles.push({
      x: bird.x + bird.w / 2, y: bird.y,
      vx: Math.cos(angle) * (Math.random() * 5 + 2),
      vy: Math.sin(angle) * (Math.random() * 5 + 2),
      life: 1, size: Math.random() * 8 + 4,
      color: `hsl(${Math.random() * 60}, 90%, 60%)`
    });
  }
}

function addPipe() {
  const minTop = 60, maxTop = BG.groundY - GAP - 60;
  const topH = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W + 10, topH, scored: false });
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1a5e');
  grad.addColorStop(0.5, '#2e4a8f');
  grad.addColorStop(1, '#5ba3dc');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fill();
  });
}

function drawClouds() {
  BG.clouds.forEach(c => {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w / 2, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - 18, c.y + 6, c.w / 3, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + 18, c.y + 6, c.w / 3.5, 9, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawGround() {
  const gy = BG.groundY;
  const grad = ctx.createLinearGradient(0, gy, 0, H);
  grad.addColorStop(0, '#5d4037');
  grad.addColorStop(0.2, '#8bc34a');
  grad.addColorStop(0.25, '#4caf50');
  grad.addColorStop(1, '#388e3c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, gy, W, H - gy);

  // Grass detail
  ctx.fillStyle = '#66bb6a';
  for (let x = 0; x < W; x += 12) {
    ctx.beginPath();
    ctx.moveTo(x, gy);
    ctx.lineTo(x + 6, gy - 8);
    ctx.lineTo(x + 12, gy);
    ctx.fill();
  }
}

function drawPipe(pipe) {
  const x = pipe.x, th = pipe.topH;
  const bY = th + GAP, bH = BG.groundY - bY;

  const pipeGradTop = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  pipeGradTop.addColorStop(0, '#2e7d32');
  pipeGradTop.addColorStop(0.4, '#66bb6a');
  pipeGradTop.addColorStop(1, '#1b5e20');

  // Top pipe body
  ctx.fillStyle = pipeGradTop;
  ctx.fillRect(x + 5, 0, PIPE_W - 10, th - 10);

  // Top pipe cap
  ctx.fillStyle = pipeGradTop;
  ctx.fillRect(x, th - 20, PIPE_W, 20);

  // Bottom pipe body
  ctx.fillStyle = pipeGradTop;
  ctx.fillRect(x + 5, bY + 20, PIPE_W - 10, bH);

  // Bottom pipe cap
  ctx.fillRect(x, bY, PIPE_W, 20);

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x + 8, 0, 6, th - 10);
  ctx.fillRect(x + 8, bY + 20, 6, bH);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x + bird.w / 2, bird.y);
  ctx.rotate(bird.rotation);

  // Body
  const grad = ctx.createRadialGradient(-4, -4, 2, 0, 0, bird.w * 0.6);
  grad.addColorStop(0, '#ffe066');
  grad.addColorStop(0.6, '#ffc107');
  grad.addColorStop(1, '#e65100');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.w / 2, bird.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  ctx.fillStyle = '#ff8f00';
  ctx.beginPath();
  const wingFlap = Math.sin(Date.now() * 0.02) * 4;
  ctx.ellipse(-4, wingFlap, 12, 7, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8, -5, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(10, -5, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(11, -7, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ff7043';
  ctx.beginPath();
  ctx.moveTo(14, -2);
  ctx.lineTo(22, 0);
  ctx.lineTo(14, 3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawScore() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 42px Arial';
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 4;
  ctx.strokeText(score, W / 2, 60);
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W / 2, 60);

  // Best
  if (best > 0 && state === 'playing') {
    ctx.font = 'bold 16px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`Best: ${best}`, W / 2, 82);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0.01);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.04;
    p.size *= 0.98;
  });
}

function checkCollision() {
  const bx = bird.x + 6, by = bird.y - bird.h / 2 + 4;
  const bw = bird.w - 12, bh = bird.h - 8;

  if (by + bh >= BG.groundY || by <= 0) return true;

  for (const p of pipes) {
    const inX = bx + bw > p.x + 4 && bx < p.x + PIPE_W - 4;
    if (inX && (by < p.topH - 4 || by + bh > p.topH + GAP + 4)) return true;
  }
  return false;
}

function die() {
  state = 'dead';
  spawnDeathParticles();
  if (score > best) best = score;

  setTimeout(() => {
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('hidden');
    document.getElementById('scoreBox').style.display = '';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestDisplay').textContent = best > 0 ? `Best: ${best}` : '';
    document.getElementById('startBtn').textContent = score === 0 ? 'TRY AGAIN' : 'PLAY AGAIN';
  }, 500);
}

let lastTime = 0;

function loop(ts = 0) {
  animFrame = requestAnimationFrame(loop);

  const dt = lastTime ? Math.min((ts - lastTime) / (1000 / 60), 3) : 1;
  lastTime = ts;

  // Idle bobbing animation
  if (state === 'idle') {
    bird.y = 300 + Math.sin(Date.now() * 0.003) * 8;
  }

  // Draw
  drawSky();
  drawStars();
  drawClouds();
  pipes.forEach(drawPipe);
  drawBird();
  drawGround();
  drawParticles();
  if (state === 'playing') drawScore();

  if (state !== 'playing') return;

  // Update bird
  bird.vy += bird.gravity * dt;
  bird.y += bird.vy * dt;
  bird.rotation = Math.min(Math.PI / 2, Math.max(-0.4, bird.vy * 0.06));

  // Update pipes
  pipeTimer += dt;
  if (pipeTimer >= PIPE_INTERVAL) { addPipe(); pipeTimer = 0; }

  pipes.forEach(p => {
    p.x -= PIPE_SPEED * dt;
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
    }
  });
  pipes = pipes.filter(p => p.x + PIPE_W > -20);

  // Update clouds
  BG.clouds.forEach(c => {
    c.x -= c.speed * dt;
    if (c.x + c.w < 0) c.x = W + c.w;
  });

  updateParticles();

  // Collision
  if (checkCollision()) die();
}

// Controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    flap();
  }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

// Start loop immediately for idle animation
loop();
</script>
</body>
</html>
